spring.application.name=Usuarios
server.port=8084
server.servlet.context-path=/usuario

# ?? Datasource ????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3310/usuariosDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.format_sql=true

# ?? JWT ???????????????????????????????????????????????????
jwt.secret=${JWT_SECRET:k7Hv2XpQmNjL9rTsWbYcAeUfGiOdZnCw1P4lVqBxKh8=}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ?? OAuth2 ????????????????????????????????????????????????
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:sin-configurar}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:sin-configurar}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# ?? Swagger ???????????????????????????????????????????????
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ?? Actuator ??????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.app.name=Usuario Service
management.info.app.version=1.0.0
management.info.app.description=Microservicio de usuarios para e-commerce


# ?? Logging con Correlation ID ????????????????????????????
logging.pattern.console=%d{HH:mm:ss} [%X{correlationId:-NO-CORRELATION-ID}] [%-5level] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-NO-CORRELATION-ID}] [%-5level] %logger{36} - %msg%n